model:
  name: "MultiNode2VecKMeans"
  parameters:
    multi_node2vec:
      d: 2 # "auto"
      window_size: 10
      n_samples: 1
      thresh: 0.5
      pvals: 1
      qvals: 0.5
      rvals: 0.25
    k_means:
      experiment_name: "test"
      visualise: True

networks: [
  "toy_network",
  "aucs",
]

train:
  seed_size: 4
  random_seed: 43

spreading_regime:
  protocol: "OR"
  p: 0.5
  n_repetitions: 30
  n_steps: 10000

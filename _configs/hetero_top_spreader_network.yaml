base:
  random_seed: 43

data:
  name: DataFrameHeteroDataset
  num_workers: 0
  real_batch_size: 1
  num_neighbors: [10, 10]
  neighbor_batch_size: 32
  protocol: OR
  output_label_name:
    - exposed
    - simulation_length
    - peak_iteration
    - peak_infected
  train_networks:
    - name: artificial_er
      features_type: zeros
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: zeros
      val_split: True
    - name: l2_course_net_1
      features_type: zeros
  val_dataset:
    - name: artificial_er
      features_type: zeros
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: zeros
      val_split: True
    - name: arxiv_netscience_coauthorship
      features_type: zeros
    - name: ckm_physicians
      features_type: zeros
    - name: eu_transport_klm
      features_type: zeros
    - name: l2_course_net_2
      features_type: zeros
  test_dataset:
    - name: aucs
      features_type: zeros
    - name: arxiv_netscience_coauthorship_math.oc
      features_type: zeros
    - name: eu_transportation
      features_type: zeros
    - name: l2_course_net_3
      features_type: zeros
    - name: lazega
      features_type: zeros
    - name: toy_network
      features_type: zeros
    - name: fmri74
      features_type: zeros
    - name: timik1q2009
      features_type: zeros

model:
  name: HeteroTopSpreaderNetwork
  aggr: sum
  parameters:
    input_dim: 6
    output_dim: 4
    hidden_channels: 100

training:
  devices: [0]
  max_epochs: 200
  loss:
    name: MRTWSE # Depends on output_dim
    # name: WeightedMSE # Depends on output_dim
    args:
      w_sl: 1
      w_e: 4
      w_pin: 1
      w_pit: 1
      # reduction: mean
  optimizer:
    name: AdamW
    args:
      weight_decay: 0.00001
      lr: 0.01
  scheduler:
    name: ReduceLROnPlateau
    args:
      mode: min
      factor: 0.5
      patience: 10
    config:
      monitor: val_loss
      interval: epoch
      frequency: 1
  loggers:
    - name: tensor_board
    - name: neptune
      model_summary_max_depth: -1
      tags:
        - name: training
        - name: gnn
        - name: zeros
        - name: hetero_with_bases
  callbacks:
    - name: model_summary
      max_depth: -1
    - name: model_checkpoint
      mode: min
      monitor: val_loss
      save_last: True
      save_top_k: 1
      verbose: True
    - name: early_stopping
      monitor: val_loss
      mode: min
      patience: 30

base:
  random_seed: 43

data:
  name: DataFrameHeteroDataset
  num_workers: 32
  batch: 
    size: 16
    neighbours_sampling: [8, 4, 2]
    subgraph_type: "bidirectional"  # TODO: test with "induced"
    gradient_accumulation_step: 1
  protocol: OR
  p_value: -1 # AND: {0.80, 0.85, 0.90, 0.95}, OR: {0.05, 0.10, 0.15, 0.20}, -1 to avg SP in protocol
  output_label_name:
    - exposed
    - simulation_length
    - peak_iteration
    - peak_infected
  train_networks:
    - name: artificial_er
      features_type: centralities
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: centralities
      val_split: True
  val_dataset:
    - name: artificial_er
      features_type: centralities
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: centralities
      val_split: True
  test_dataset:
    - name: arxiv_netscience_coauthorship
      features_type: centralities
    - name: aucs
      features_type: centralities
    - name: ckm_physicians
      features_type: centralities
    - name: eu_transportation
      features_type: centralities
    - name: l2_course_net_1
      features_type: centralities
    - name: lazega
      features_type: centralities
    - name: timik1q2009
      features_type: centralities

model:
  name: HeteroTopSpreaderNetwork
  parameters:
    input_dim: 6
    output_dim: 4
    hidden_channels: 100

training:
  devices: [0]
  max_epochs: 200
  loss:
    name: MRTWSE # Depends on output_dim
    # name: WeightedMSE # Depends on output_dim
    args:
      w_sl: 1
      w_e: 4
      w_pin: 1
      w_pit: 1
  optimizer:
    name: AdamW
    args:
      weight_decay: 0.00001
      lr: 0.01
  scheduler:
    name: ReduceLROnPlateau
    args:
      mode: min
      factor: 0.5
      patience: 10
    config:
      monitor: val_loss
      interval: epoch
      frequency: 1
  loggers:
    - name: tensor_board
    - name: neptune
      model_summary_max_depth: -1
      tags:
        - name: net-hetero_with_bases
        - name: data-full
        - name: features-centralities
        - name: loss-mrtwse
        - name: icm_proto-or
        - name: icm_p-average
        - name: batch_level-actor
  callbacks:
    - name: model_summary
      max_depth: -1
    - name: model_checkpoint
      mode: min
      monitor: val_loss
      save_last: True
      save_top_k: 1
      verbose: True
    - name: early_stopping
      monitor: val_loss
      mode: min
      patience: 30

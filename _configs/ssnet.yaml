base:
  random_seed: 43

data:
  name: SuperSpreadersDataSet
  num_workers: -1
  batch:
    size: 32
    neighbours_sampling: [8, 4, 2]
    subgraph_type: "induced" # TODO: test with "induced"
    # gradient_accumulation_step: 1 # TODO: nothing works except 1
  icm:
    protocol: OR
    p: -1 # AND: {0.80, 0.85, 0.90, 0.95}, OR: {0.05, 0.10, 0.15, 0.20}, -1 to avg SP in protocol
  output_label_name:
    - exposed
    - simulation_length
    - peak_iteration
    - peak_infected
  train_data:
    # - name: artificial_er
    #   features_type: centralities
    # - name: artificial_pa
    #   features_type: centralities
    - name: artificial_small
      features_type: centralities
  val_data:
    ratio: 0.2
  test_data:
    - name: arxiv_netscience_coauthorship
      features_type: centralities
    - name: aucs
      features_type: centralities
    - name: ckm_physicians
      features_type: centralities
    # - name: eu_transportation
    #   features_type: centralities
    # - name: l2_course
    #   features_type: centralities
    # - name: lazega
    #   features_type: centralities
    # - name: timik1q2009
    #   features_type: centralities
    # ##### ##### ##### ##### ##### ##### ##### ##### other available networks
    # - name: cannes
    #   features_type: centralities
    # - name: fmri74
    #   features_type: centralities
    # - name: toy_network
    #   features_type: centralities

model:
  name: SSNet
  parameters:
    input_dim: 5
    output_dim: 4
    hidden_channels: 400

training:
  accelerator: gpu # cpu or gpu
  devices: [0] # list[int] | int | str; default=auto # TODO it seems that if more than 1 GPU is available, then training is repeated on all available devices
  max_epochs: 2
  loss:
    name: MRTWSE # Depends on the "output_dim"
    args:
      w_sl: 1
      w_e: 4
      w_pin: 1
      w_pit: 1
  optimizer:
    name: AdamW
    args:
      weight_decay: 0.00001
      lr: 0.001
  scheduler:
    name: ReduceLROnPlateau
    args:
      mode: min
      factor: 0.5
      patience: 10
    config:
      monitor: val_loss
      interval: epoch
      frequency: 1
  logger:
    name: neptune
    model_summary_max_depth: -1
    tags:
      - name: TEST-LOADERS
      - name: net-ssnet
      - name: data-full
      - name: features-centralities
      - name: loss-mrtwse
      - name: icm_proto-or
      - name: icm_p-average
      - name: batch_level-actor
  callbacks:
    - name: model_summary
      max_depth: -1
    - name: model_checkpoint
      mode: min
      monitor: val_loss
      save_last: True
      save_top_k: 1
      verbose: True
    - name: early_stopping
      monitor: val_loss
      mode: min
      patience: 30

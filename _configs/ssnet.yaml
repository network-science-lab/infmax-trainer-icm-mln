base:
  random_seed: 43
  
data:
  name: DataFrameHeteroDataset
  num_workers: 0 # TODO values different than 0 it do not work on thorium
  real_batch_size: 1
  num_neighbors: [10, 10]
  neighbours_batch_size: 32
  protocol: OR
  output_label_name: 
    - exposed
    - simulation_length
    - peak_iteration
    - peak_infected
  train_networks:
    - name: artificial_er
      features_type: centralities
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: centralities
      val_split: True
  val_dataset:
    - name: artificial_er
      features_type: centralities
      val_split: True
    - name: artificial_pa
      features_type: zeros
      val_split: True
    - name: artificial_small
      features_type: centralities
      val_split: True
  test_dataset:
    - name: arxiv_netscience_coauthorship
      features_type: centralities
    - name: aucs
      features_type: centralities
    - name: ckm_physicians
      features_type: centralities
    - name: eu_transportation
      features_type: centralities
    - name: l2_course_net_1
      features_type: centralities
    - name: lazega
      features_type: centralities
    - name: timik1q2009
      features_type: centralities
    # ##### ##### ##### ##### ##### ##### ##### ##### other available networks 
    # - name: arxiv_netscience_coauthorship_math.oc
    #   features_type: centralities
    # - name: cannes
    #   features_type: centralities
    # - name: eu_transport_klm
    #   features_type: centralities
    # - name: fmri74
    #   features_type: centralities
    # - name: toy_network
    #   features_type: centralities

model:
  name: SSNet
  parameters:
    input_dim: 5 
    output_dim: 4
    hidden_channels: 400 

training:
  devices: [0]  # TODO it seems that if more than 1 GPU is available, then training is repeated on all available devices
  max_epochs: 5000
  loss:
    name: MRTWSE # Depends on output_dim
    args:
      w_sl: 1
      w_e: 4
      w_pin: 1
      w_pit: 1
  optimizer:
    name: AdamW
    args:
      weight_decay: 0.00001
      lr: 0.001
  scheduler:
    name: ReduceLROnPlateau
    args:
      mode: min
      factor: 0.5
      patience: 10
    config:
      monitor: val_loss
      interval: epoch
      frequency: 1
  loggers:
    - name: neptune
      model_summary_max_depth: -1
      tags:
        - name: training
        - name: gnn
        - name: net-ssnet_deep
        - name: data-big
        - name: loss-mrtwse
        - name: protocol-or
  callbacks:
   - name: model_summary
     max_depth: -1
   - name: model_checkpoint
     mode: min
     monitor: val_loss
     save_last: True
     save_top_k: 1
     verbose: True
   - name: early_stopping
     monitor: val_loss
     mode: min
     patience: 30

model:
  name: "MultiNode2VecKMeans"
  parameters:
    multi_node2vec:
      dir: /data
      output: /data
      d: 2
      window_size: 10
      n_samples: 1
      thresh: 0.5
      pvals: 1
      qvals: 0.5
      rvals: 0.25
    k_means:
      num_segments: 3
      visualise: True
      experiment_name: "test"

networks: [
  "toy_network",
]

run:
  random_seed: 43
